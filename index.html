<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <title>高校招生问答系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }

        /* 顶部导航栏 */
        .navbar { background-color: #0056b3; color: white; padding: 15px 20px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 聊天主容器 */
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 0 auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.05); overflow: hidden; }

        /* 历史记录区 */
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; }
        .user-message { align-self: flex-end; background-color: #e3f2fd; color: #0d47a1; border-bottom-right-radius: 0; }
        .ai-message { align-self: flex-start; background-color: #f5f5f5; color: #333; border-bottom-left-radius: 0; }

        /* 输入区 */
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; transition: border 0.3s; }
        .input-area input:focus { border-color: #0056b3; }
        .input-area button { padding: 12px 24px; background-color: #0056b3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; transition: background 0.3s; }
        .input-area button:hover { background-color: #004494; }
        .input-area button:disabled { background-color: #ccc; cursor: not-allowed; }

        .ai-message h1, .ai-message h2, .ai-message h3 {
            margin: 10px 0;
        }
        .ai-message p {
            margin: 0;
        }
        .ai-message code {
            background-color: #eee;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }
        .ai-message pre {
            background-color: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .ai-message pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .ai-message ul, ol {
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">高校招生问答系统</div>

    <div class="chat-container">
        <div class="chat-history" id="chat-history">
            <div class="message ai-message">你好！我是高校招生问答助手。请问有什么我可以帮你的？</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="请输入你的问题" onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // 后端API地址
        const API_URL = "http://127.0.0.1:8000/chat";

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const sendBtn = document.getElementById("send-btn");
            const chatHistory = document.getElementById("chat-history");
            const text = inputField.value.trim();

            if (!text) return;

            // 1. 显示用户消息
            appendMessage(text, 'user-message');
            inputField.value = '';

            // 锁定输入框防止重复发送
            inputField.disabled = true;
            sendBtn.disabled = true;
            sendBtn.innerText = '思考中...';

            try {
                // 2. 向后端发送请求
                const response = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: text })
                });

                if (!response.ok) throw new Error("网络响应失败");

                const data = await response.json();

                // 3. 显示AI回复
                appendMessage(data.answer, 'ai-message');
            } catch (error) {
                appendMessage("抱歉，系统出现了一点错误，请检查后端服务是否启动。", 'ai-message');
                console.error("Error:", error);
            } finally {
                // 解锁输入框
                inputField.disabled = false;
                sendBtn.disabled = false;
                sendBtn.innerText = '发送';
                inputField.focus();
            }
        }

        function appendMessage(text, className) {
            const chatHistory = document.getElementById("chat-history");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            // msgDiv.innerText = text;
            if (className === 'ai-message') {
                msgDiv.innerHTML = marked.parse(text);  // 渲染Markdown
            } else {
                msgDiv.innerText = text; // 用户消息仍然用纯文本
            }
            chatHistory.appendChild(msgDiv);
            // 自动滚动到底部
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
